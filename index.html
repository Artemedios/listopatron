  <script>
    // ==================== LISTO PATRÓN - JAVASCRIPT MEJORADO ====================

    // Preloader
    window.addEventListener('load', function() {
      const preloader = document.getElementById('preloader');
      if (preloader) {
        setTimeout(() => {
          preloader.style.opacity = '0';
          preloader.style.visibility = 'hidden';
          setTimeout(() => preloader.style.display = 'none', 500);
        }, 1800);
      }
    });

    // Scroll to top button
    window.addEventListener('scroll', function() {
      const scrollTop = document.getElementById('scrollTop');
      if (scrollTop) {
        if (window.pageYOffset > 500) {
          scrollTop.classList.add('visible');
        } else {
          scrollTop.classList.remove('visible');
        }
      }
    }, { passive: true });

    // Scroll to top functionality
    document.getElementById('scrollTop')?.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Intersection Observer para animaciones
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.1
    };

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');

          // Tracking de eventos de vista
          const section = entry.target.closest('section');
          if (section) {
            const sectionId = section.id || section.className;
            gtag('event', 'section_view', {
              'section_id': sectionId,
              'page_location': window.location.href
            });
          }
        }
      });
    }, observerOptions);

    // Observar todos los elementos con clase reveal
    document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale, .feature, .step, .pricing-card, .testimonial').forEach(el => {
      el.classList.add('reveal');
      revealObserver.observe(el);
    });

    // Mobile menu toggle mejorado
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    if (menuToggle && navLinks) {
      menuToggle.addEventListener('click', function() {
        const isExpanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !isExpanded);
        navLinks.classList.toggle('active');

        // Tracking
        gtag('event', 'menu_toggle', {
          'action': isExpanded ? 'close' : 'open'
        });
      });

      // Cerrar menú al hacer click en un enlace
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          navLinks.classList.remove('active');
          menuToggle.setAttribute('aria-expanded', 'false');
        });
      });
    }

    // Smooth scroll para enlaces de anclaje
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          const headerOffset = 80;
          const elementPosition = target.getBoundingClientRect().top;
          const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });

          // Tracking
          gtag('event', 'anchor_click', {
            'anchor_id': this.getAttribute('href')
          });
        }
      });
    });

    // Formulario de contacto mejorado
    const contactForm = document.getElementById('contactForm');
    if (contactForm) {
      contactForm.addEventListener('submit', function(e) {
        e.preventDefault();

        // Validación
        let isValid = true;
        const requiredFields = contactForm.querySelectorAll('[required]');

        requiredFields.forEach(field => {
          const formGroup = field.closest('.form-group');
          if (!field.value.trim()) {
            isValid = false;
            formGroup.classList.add('error');
          } else {
            formGroup.classList.remove('error');
          }
        });

        if (isValid) {
          // Simular envío (aquí iría el código real de envío)
          const formData = new FormData(contactForm);
          const successMessage = contactForm.querySelector('.form-success');

          // Mostrar éxito
          successMessage.classList.add('show');
          contactForm.reset();

          // Tracking de conversión
          gtag('event', 'form_submit', {
            'form_id': 'contact_form',
            'form_location': 'contact_section'
          });
          fbq('track', 'Contact');

          // Ocultar mensaje después de 5 segundos
          setTimeout(() => {
            successMessage.classList.remove('show');
          }, 5000);
        }
      });
    }

    // Botones CTA tracking
    document.querySelectorAll('.btn, .cta-button').forEach(btn => {
      btn.addEventListener('click', function() {
        const btnText = this.textContent.trim();
        const btnHref = this.getAttribute('href') || 'no-link';

        gtag('event', 'cta_click', {
          'button_text': btnText,
          'button_href': btnHref
        });
      });
    });

    // Lazy loading para imágenes
    if ('IntersectionObserver' in window) {
      const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.classList.add('loaded');
            imageObserver.unobserve(img);
          }
        });
      });

      document.querySelectorAll('img[data-src]').forEach(img => {
        imageObserver.observe(img);
      });
    }

    // Performance monitoring
    window.addEventListener('load', function() {
      setTimeout(() => {
        if (window.performance) {
          const perfData = window.performance.timing;
          const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;

          gtag('event', 'timing_complete', {
            'name': 'page_load',
            'value': pageLoadTime
          });
        }
      }, 0);
    });

    // Service Worker para PWA (opcional)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered:', registration);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }

    // Console branding
    console.log('%c🔧 Listo Patrón', 'font-size: 24px; font-weight: bold; color: #F26000;');
    console.log('%c¿Buscas soluciones para tu hogar? Visita listopatron.com', 'font-size: 14px; color: #666;');


  </script>
